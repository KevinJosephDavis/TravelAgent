<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>旅游助手</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet" />
  <style>
    :root {
      --bg: #ffffff;
      --sidebar: #f9f9f9;
      --border: #e5e5e5;
      --text: #0d0d0d;
      --text-muted: #676767;
      --user-bubble: #f4f4f4;
      --assistant-bubble: #ffffff;
      --accent: #10a37f;
      --input-bg: #ffffff;
      --shadow: 0 2px 12px rgba(0, 0, 0, 0.06);
    }

    * {
      box-sizing: border-box;
    }

    html, body {
      height: 100%;
      margin: 0;
      font-family: "Inter", -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      font-size: 15px;
      line-height: 1.5;
      color: var(--text);
      background: var(--bg);
    }

    .app {
      display: flex;
      height: 100%;
      max-width: 100%;
    }

    .sidebar {
      width: 260px;
      min-width: 260px;
      background: var(--sidebar);
      border-right: 1px solid var(--border);
      display: flex;
      flex-direction: column;
      padding: 12px;
    }

    .sidebar-brand {
      font-weight: 600;
      font-size: 14px;
      padding: 12px 10px;
      color: var(--text);
    }

    .sidebar-hint {
      font-size: 12px;
      color: var(--text-muted);
      padding: 0 10px 16px;
      line-height: 1.45;
    }

    .btn-new {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      padding: 10px 12px;
      margin: 0 4px;
      border: 1px solid var(--border);
      border-radius: 8px;
      background: var(--bg);
      cursor: pointer;
      font-size: 14px;
      font-weight: 500;
      color: var(--text);
      transition: background 0.15s ease;
    }

    .btn-new:hover {
      background: #f0f0f0;
    }

    .main {
      flex: 1;
      display: flex;
      flex-direction: column;
      min-width: 0;
      background: var(--bg);
    }

    .header {
      height: 48px;
      border-bottom: 1px solid var(--border);
      display: flex;
      align-items: center;
      justify-content: center;
      font-weight: 600;
      font-size: 15px;
      background: var(--bg);
    }

    .messages {
      flex: 1;
      overflow-y: auto;
      padding: 24px 16px 120px;
      max-width: 768px;
      width: 100%;
      margin: 0 auto;
    }

    .msg {
      display: flex;
      gap: 16px;
      margin-bottom: 24px;
      animation: fadeIn 0.2s ease;
    }

    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(4px); }
      to { opacity: 1; transform: translateY(0); }
    }

    .msg.user {
      flex-direction: row-reverse;
    }

    .avatar {
      width: 32px;
      height: 32px;
      border-radius: 4px;
      flex-shrink: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 14px;
      font-weight: 600;
    }

    .msg.user .avatar {
      background: var(--accent);
      color: #fff;
    }

    .msg.assistant .avatar {
      background: #19c37d;
      color: #fff;
    }

    .bubble-wrap {
      max-width: calc(100% - 48px);
    }

    .bubble {
      padding: 12px 16px;
      border-radius: 12px;
      white-space: pre-wrap;
      word-break: break-word;
    }

    .msg.user .bubble {
      background: var(--user-bubble);
      border: 1px solid var(--border);
    }

    .msg.assistant .bubble {
      background: var(--assistant-bubble);
      border: 1px solid transparent;
      box-shadow: var(--shadow);
    }

    .composer-wrap {
      position: fixed;
      bottom: 0;
      left: 0;
      right: 0;
      padding: 12px 16px 24px;
      background: linear-gradient(to top, var(--bg) 70%, transparent);
      pointer-events: none;
    }

    .composer-wrap .composer-inner {
      pointer-events: auto;
      max-width: 768px;
      margin: 0 auto;
    }

    .composer {
      display: flex;
      align-items: flex-end;
      gap: 10px;
      border: 1px solid var(--border);
      border-radius: 24px;
      padding: 8px 12px;
      background: var(--input-bg);
      box-shadow: var(--shadow);
    }

    .composer textarea {
      flex: 1;
      border: none;
      resize: none;
      font: inherit;
      line-height: 1.5;
      padding: 8px 4px;
      max-height: 200px;
      min-height: 24px;
      outline: none;
      background: transparent;
      color: var(--text);
    }

    .composer textarea::placeholder {
      color: var(--text-muted);
    }

    .btn-send {
      width: 36px;
      height: 36px;
      border-radius: 10px;
      border: none;
      background: var(--accent);
      color: #fff;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
      transition: opacity 0.15s ease;
    }

    .btn-send:disabled {
      opacity: 0.45;
      cursor: not-allowed;
    }

    .btn-send:not(:disabled):hover {
      opacity: 0.92;
    }

    .typing .bubble {
      color: var(--text-muted);
      font-style: italic;
    }

    .empty-state {
      text-align: center;
      padding: 48px 24px;
      color: var(--text-muted);
    }

    .empty-state h2 {
      margin: 0 0 8px;
      font-size: 20px;
      font-weight: 600;
      color: var(--text);
    }

    @media (max-width: 720px) {
      .sidebar {
        display: none;
      }
    }
  </style>
</head>
<body>
  <div class="app">
    <aside class="sidebar">
      <div class="sidebar-brand">旅游助手</div>
      <p class="sidebar-hint">根据天气与偏好推荐景点。后端需运行 <code>uvicorn main:app --reload</code>。</p>
      <button type="button" class="btn-new" id="btnNew">+ 新对话</button>
    </aside>
    <main class="main">
      <header class="header">智能景点推荐</header>
      <div class="messages" id="messages">
        <div class="empty-state" id="emptyState">
          <h2>开始对话</h2>
          <p>例如：北京今天天气怎么样？适合去哪里玩？</p>
        </div>
      </div>
    </main>
  </div>
  <div class="composer-wrap">
    <div class="composer-inner">
      <form class="composer" id="form">
        <textarea
          id="input"
          rows="1"
          placeholder="给旅游助手发消息…"
          autocomplete="off"
        ></textarea>
        <button type="submit" class="btn-send" id="send" title="发送" aria-label="发送">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="currentColor" aria-hidden="true">
            <path d="M2.01 21L23 12 2.01 3 2 10l15 2-15 2z" />
          </svg>
        </button>
      </form>
    </div>
  </div>

  <script>
    const API_BASE = "";

    const messagesEl = document.getElementById("messages");
    const emptyState = document.getElementById("emptyState");
    const form = document.getElementById("form");
    const input = document.getElementById("input");
    const sendBtn = document.getElementById("send");
    const btnNew = document.getElementById("btnNew");

    function hideEmpty() {
      if (emptyState && emptyState.parentNode) emptyState.remove();
    }

    function appendMessage(role, text, { typing = false } = {}) {
      hideEmpty();
      const row = document.createElement("div");
      row.className = "msg " + role + (typing ? " typing" : "");
      const av = document.createElement("div");
      av.className = "avatar";
      av.textContent = role === "user" ? "我" : "助";
      const wrap = document.createElement("div");
      wrap.className = "bubble-wrap";
      const bubble = document.createElement("div");
      bubble.className = "bubble";
      bubble.textContent = text;
      wrap.appendChild(bubble);
      row.appendChild(av);
      row.appendChild(wrap);
      messagesEl.appendChild(row);
      messagesEl.scrollTop = messagesEl.scrollHeight;
      return { row, bubble };
    }

    function setLoading(loading) {
      sendBtn.disabled = loading;
      input.disabled = loading;
    }

    async function sendMessage(text) {
      const trimmed = text.trim();
      if (!trimmed) return;

      appendMessage("user", trimmed);
      input.value = "";
      input.style.height = "auto";
      const { row, bubble } = appendMessage("assistant", "正在思考…", { typing: true });
      setLoading(true);

      try {
        const res = await fetch(API_BASE + "/api/chat", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ message: trimmed }),
        });
        const data = await res.json().catch(() => ({}));
        row.classList.remove("typing");
        if (!res.ok) {
          const d = data.detail;
          const errText = Array.isArray(d)
            ? d.map((x) => (x && x.msg) || JSON.stringify(x)).join("；")
            : d || data.message || "请求失败 (" + res.status + ")";
          bubble.textContent = errText;
        } else {
          bubble.textContent = data.reply || "(无回复)";
        }
      } catch (e) {
        row.classList.remove("typing");
        bubble.textContent = "网络错误：请确认服务已启动且地址正确。";
      } finally {
        setLoading(false);
        messagesEl.scrollTop = messagesEl.scrollHeight;
        input.focus();
      }
    }

    form.addEventListener("submit", (e) => {
      e.preventDefault();
      sendMessage(input.value);
    });

    input.addEventListener("keydown", (e) => {
      if (e.key === "Enter" && !e.shiftKey) {
        e.preventDefault();
        sendMessage(input.value);
      }
    });

    input.addEventListener("input", () => {
      input.style.height = "auto";
      input.style.height = Math.min(input.scrollHeight, 200) + "px";
    });

    btnNew.addEventListener("click", () => {
      fetch(API_BASE + "/api/chat/reset", { method: "POST" })
        .catch(() => {})
        .finally(() => {
          messagesEl.innerHTML = "";
          const es = document.createElement("div");
          es.className = "empty-state";
          es.id = "emptyState";
          es.innerHTML = "<h2>开始对话</h2><p>例如：北京今天天气怎么样？适合去哪里玩？</p>";
          messagesEl.appendChild(es);
          input.focus();
        });
    });
  </script>
</body>
</html>
